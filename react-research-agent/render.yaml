services:
  - type: web
    name: react-research-agent
    runtime: python
    rootDir: react-research-agent
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: OPENAI_API_KEY
        sync: false
      - key: TAVILY_API_KEY
        sync: false
      - key: CORS_ALLOW_ORIGINS
        value: "*"

  - type: web
    name: react-research-agent-frontend
    runtime: static
    rootDir: react-research-agent/frontend
    plan: free
    buildCommand: |
      mkdir -p dist
      cp index.html styles.css app.js dist/
      printf "window.APP_CONFIG = { API_BASE_URL: '%s' };\n" "${API_BASE_URL:-http://localhost:8000}" > dist/config.js
    staticPublishPath: ./react-research-agent/frontend/dist
    autoDeploy: true
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: API_BASE_URL
        fromService:
          name: react-research-agent
          type: web
          envVarKey: RENDER_EXTERNAL_URL
